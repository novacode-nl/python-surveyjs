name: tests

on:
  push:
    branches:
      - '**'

jobs:
  tests:
    name: Basic unit tests

    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@v3

    # Install Nix directly. The dev shell (shell.nix -> nix/pkgs.nix) pins its
    # own nixpkgs via fetchTarball, so no NIX_PATH/channel is needed here. We run
    # each step inside `nix-shell` instead of relying on direnv, which avoids the
    # HatsuneMiku3939/direnv-action digest requirement entirely.
    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Install basic dependencies via poetry
      run: nix-shell --run "poetry install"

    - name: Run the tests
      run: nix-shell --run "poetry run python -m unittest"
